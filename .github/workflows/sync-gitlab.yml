# Mirror this repo's main + dev branches to GitLab on every push.
#
# GitHub is the source of truth. GitLab runs the publish-to-npm CI on
# pushes to `main`. Without this workflow, merging on GitHub doesn't
# update GitLab and the release never publishes.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   - GITLAB_SYNC_USER:  GitLab username for the token below
#   - GITLAB_SYNC_TOKEN: GitLab Project Access Token with `write_repository`
#                        scope, Maintainer role
#
# How to mint the token:
#   1. GitLab → ourfreelight/HotStaq → Settings → Access Tokens
#   2. Name: "github-sync", Role: Maintainer, Scopes: write_repository
#   3. Set a long expiry (1 year) and rotate when it lapses
#   4. The username field in GitHub secret is the literal token name
#      (Project Access Tokens authenticate as `<token-name>:<token>`)
#
# Branch protection note:
#   GitLab `main` is protected. The Project Access Token's Maintainer
#   role bypasses protection on push, so this workflow can update main.
#   If you ever swap to a Deploy Token instead, check
#   "Allowed to push" includes the deploy token in the GitLab branch
#   protection settings.

name: Sync to GitLab

on:
  push:
    branches:
      - main
      - dev

concurrency:
  # Don't let two pushes to the same branch race each other.
  group: sync-gitlab-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push-to-gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the GitLab side accepts the push as
          # fast-forward instead of forcing.
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_USER: ${{ secrets.GITLAB_SYNC_USER }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "::error::GITLAB_SYNC_TOKEN not set; configure it in repo Secrets"
            exit 1
          fi
          git remote add gitlab \
            "https://${GITLAB_USER}:${GITLAB_TOKEN}@gitlab.higheredgesoftware.com/OurFreeLight/HotStaq.git"
          git push gitlab "${BRANCH}:${BRANCH}"
